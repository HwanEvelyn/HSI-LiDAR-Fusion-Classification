name: hct_bgc_v2_1_ms_houston_random
output_root: results/repeats
train_args:
  model: hct_bgc
  data_root: data/raw/Houston 2013/2013_DFTC
  split_mode: random
  train_ratio: 0.6
  val_ratio: 0.2
  preprocess_scope: train
  patch_size: 11
  context_patch_size: 17
  context_token_size: 11
  scale_fusion_mode: residual
  pca_components: 30
  embed_dim: 128
  num_heads: 4
  num_layers: 2
  fusion_layers: 1
  encoder_variant: light_hetero
  use_conservative_fusion: true
  use_aux_heads: true
  aux_head_mode: linear
  aux_weight: 0.2
  aux_distill_weight: 0.1
  aux_distill_temperature: 2.0
  dropout: 0.1
  weight_decay: 5e-4
  label_smoothing: 0.1
  selection_metric: val_kappa
  early_stopping_patience: 8
  epochs: 30
  batch_size: 64
  num_workers: 0
  split_seed: 42
